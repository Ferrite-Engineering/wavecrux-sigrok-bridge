name: ci

on:
  schedule:
    - cron: '0 5 * * *'   # 05:00 UTC nightly
  workflow_dispatch:        # allow manual trigger

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: short
  # Force cargo's crates.io transfers onto HTTP/1.1. The HTTP/2 multiplexed
  # downloader intermittently dies with "[16] Error in the HTTP2 framing
  # layer" on GitHub runners (seen 2026-06-19 fetching colorchoice), failing
  # the whole build on a transient network fault. HTTP/1.1 is marginally
  # slower but does not hit the framing bug.
  CARGO_HTTP_MULTIPLEXING: false

jobs:
  build_and_test:
    name: build + test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ matrix.os }}-cargo-${{ hashFiles('**/Cargo.lock', '**/Cargo.toml') }}

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Test
        run: cargo test --workspace

      - name: Build release shim (used by isolation gate downstream)
        run: cargo build --release -p wavecrux-sigrok-bridge-shim

      - name: Verify license isolation
        if: matrix.os != 'windows-latest'
        run: bash tool/verify_isolation.sh

      # The Windows isolation check is run inline because the bash
      # script is POSIX-flavored; this verifies the same invariants.
      - name: Verify license isolation (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $bin = "target/release/wavecrux_sigrok_bridge.dll"
          if (-not (Test-Path $bin)) {
            Write-Error "no shim binary at $bin"
            exit 2
          }
          # `dumpbin` ships with MSVC but is not on PATH in the default
          # runner shell. Resolve its full path via vswhere (preinstalled
          # on windows runners) rather than depending on a dev-cmd shell.
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $dumpbin = & $vswhere -latest -products * `
            -find "VC\Tools\MSVC\*\bin\Hostx64\x64\dumpbin.exe" |
            Select-Object -First 1
          if (-not $dumpbin) {
            Write-Error "could not locate dumpbin.exe via vswhere"
            exit 2
          }
          $deps = & $dumpbin /dependents $bin
          if ($deps -match 'sigrokdecode|python3[0-9]+\.dll') {
            Write-Error "forbidden GPL DLL linkage:`n$deps"
            exit 1
          }
          $syms = & $dumpbin /symbols $bin
          if ($syms -match '(\W|_)srd_|(\W|_)Py_|(\W|_)PyInit|(\W|_)PyEval|(\W|_)PyImport|(\W|_)PyObject|(\W|_)PyModule|(\W|_)PyArg|(\W|_)PyTuple') {
            Write-Error "forbidden GPL symbols present"
            exit 1
          }
          Write-Output "OK: no GPL linkage or symbols"

  # The `sigrok` feature builds the bridge subprocess against the real
  # libsigrokdecode + libpython chain — the backend we ship going forward.
  # These jobs are REQUIRED (no continue-on-error): a broken real build
  # fails CI. The mock backend must keep compiling and passing too, which
  # the default-feature `build_and_test` job above covers. Linux uses apt
  # and macOS uses Homebrew; both ship a `pkg-config`-discoverable
  # libsigrokdecode that `build.rs` finds automatically. bindgen needs
  # `libclang`, so it is installed explicitly.
  build_sigrok_feature_linux:
    name: build with sigrok feature (linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install libsigrokdecode + Python + bindgen toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libsigrokdecode4 libsigrokdecode-dev python3-dev \
            pkg-config clang libclang-dev
      - name: Build bridge with sigrok feature
        run: cargo build -p wavecrux-sigrok-bridge --features sigrok
      - name: Test with sigrok feature
        run: cargo test -p wavecrux-sigrok-bridge --features sigrok

  build_sigrok_feature_macos:
    name: build with sigrok feature (macos)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install libsigrokdecode (Homebrew)
        run: |
          brew update
          # libsigrokdecode pulls in glib + a python@3.x. pkg-config is the
          # binary build.rs shells out to locate the headers/libs; bindgen
          # uses the libclang from Xcode's command-line tools.
          brew install pkg-config libsigrokdecode
      - name: Build bridge with sigrok feature
        run: cargo build -p wavecrux-sigrok-bridge --features sigrok
      - name: Test with sigrok feature
        run: cargo test -p wavecrux-sigrok-bridge --features sigrok

  # TODO(windows-sigrok): wire up a `build_sigrok_feature_windows` job.
  # Windows has no apt/Homebrew equivalent for libsigrokdecode — the only
  # distribution is the sigrok-cli installer / nightly zips from
  # https://sigrok.org/wiki/Windows. Until that download story is pinned
  # to a known-good artifact, `build.rs` supports a manual install via the
  # `LIBSIGROKDECODE_DIR` env var (see docs/INSTALL.md, Windows section),
  # but CI does not exercise the sigrok feature on Windows. The default
  # (mock) build + isolation gate already run on windows-latest above.
