name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: short

jobs:
  build_and_test:
    name: build + test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ matrix.os }}-cargo-${{ hashFiles('**/Cargo.lock', '**/Cargo.toml') }}

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Test
        run: cargo test --workspace

      - name: Build release shim (used by isolation gate downstream)
        run: cargo build --release -p wavecrux-sigrok-bridge-shim

      - name: Verify license isolation
        if: matrix.os != 'windows-latest'
        run: bash tool/verify_isolation.sh

      # The Windows isolation check is run inline because the bash
      # script is POSIX-flavored; this verifies the same invariants.
      - name: Verify license isolation (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $bin = "target/release/wavecrux_sigrok_bridge.dll"
          if (-not (Test-Path $bin)) {
            Write-Error "no shim binary at $bin"
            exit 2
          }
          $deps = & dumpbin /dependents $bin
          if ($deps -match 'sigrokdecode|python3[0-9]+\.dll') {
            Write-Error "forbidden GPL DLL linkage:`n$deps"
            exit 1
          }
          $syms = & dumpbin /symbols $bin
          if ($syms -match '(\W|_)srd_|(\W|_)Py_|(\W|_)PyInit|(\W|_)PyEval|(\W|_)PyImport|(\W|_)PyObject|(\W|_)PyModule|(\W|_)PyArg|(\W|_)PyTuple') {
            Write-Error "forbidden GPL symbols present"
            exit 1
          }
          Write-Output "OK: no GPL linkage or symbols"

  # The `sigrok` feature builds the bridge subprocess against the real
  # libsigrokdecode + libpython chain. We only run it on Linux because
  # `apt install libsigrokdecode-dev` is the simplest way to get a known
  # version — macOS Homebrew and Windows builds will be wired in once
  # the library hookup is implemented (see crates/bridge/src/srd.rs).
  build_sigrok_feature_linux:
    name: build with sigrok feature (linux)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install libsigrokdecode + Python dev headers
        run: |
          sudo apt-get update
          sudo apt-get install -y libsigrokdecode4 libsigrokdecode-dev python3-dev
      - name: Build bridge with sigrok feature
        run: cargo build -p wavecrux-sigrok-bridge --features sigrok
      - name: Test with sigrok feature
        run: cargo test -p wavecrux-sigrok-bridge --features sigrok
