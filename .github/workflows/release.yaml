name: release

# Build per-OS+arch release archives and upload them to a GitHub
# Release on tag push.
#
# The release archive contains:
#   - libwavecrux_sigrok_bridge.{so,dylib,dll}  (the shim)
#   - wavecrux-sigrok-bridge[.exe]              (the subprocess)
#   - README.md, LICENSE, INSTALL.md
#   - SHA256SUMS
#
# Backend per target:
#   - linux (x86_64) and macOS (x86_64, arm64) ship the REAL
#     `--features sigrok` backend: the bridge links libsigrokdecode and
#     the Python decoder corpus dynamically, so the end user installs the
#     runtime (`apt install libsigrokdecode4` / `brew install
#     libsigrokdecode`) per docs/INSTALL.md — the archive is not
#     self-contained.
#   - windows ships the MOCK backend for now (no apt/Homebrew source for
#     libsigrokdecode on Windows; the DLL-bundling story is unresolved).
#     See the `sigrok: false` matrix entry and docs/INSTALL.md.
#
# Tag scheme: v-MAJOR.MINOR.PATCH (matches Cargo.toml).

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    name: build (${{ matrix.target.os }} ${{ matrix.target.arch }})
    runs-on: ${{ matrix.target.runner }}
    strategy:
      fail-fast: false
      matrix:
        # `sigrok: true` builds the real libsigrokdecode backend on a
        # Linux x86_64 runner that builds the GPL toolchain
        # (libsigrokdecode + Python + libclang). Windows stays on the
        # mock backend (`sigrok: false`). Rive has no Linux/Windows ARM
        # runtime, so WaveCrux ships no Linux/Windows ARM build and the
        # bridge follows suit — macOS ARM (Apple Silicon) is unaffected.
        target:
          - { os: linux,   arch: x86_64,  runner: ubuntu-latest,    triple: x86_64-unknown-linux-gnu,  sigrok: true }
          - { os: macos,   arch: x86_64,  runner: macos-13,         triple: x86_64-apple-darwin,        sigrok: true }
          - { os: macos,   arch: arm64,   runner: macos-14,         triple: aarch64-apple-darwin,       sigrok: true }
          - { os: windows, arch: x86_64,  runner: windows-latest,   triple: x86_64-pc-windows-msvc,     sigrok: false }
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target.triple }}

      - name: Install SigRok build deps (Linux)
        if: matrix.target.os == 'linux' && matrix.target.sigrok
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libsigrokdecode4 libsigrokdecode-dev python3-dev \
            pkg-config clang libclang-dev

      - name: Install SigRok build deps (macOS)
        if: matrix.target.os == 'macos' && matrix.target.sigrok
        run: |
          brew update
          brew install pkg-config libsigrokdecode

      - name: Build shim + bridge (release)
        run: cargo build --release --workspace --target ${{ matrix.target.triple }} ${{ matrix.target.sigrok && '--features sigrok' || '' }}

      - name: Verify license isolation (POSIX)
        if: matrix.target.os != 'windows'
        run: bash tool/verify_isolation.sh target/${{ matrix.target.triple }}/release/libwavecrux_sigrok_bridge${{ matrix.target.os == 'macos' && '.dylib' || '.so' }}

      - name: Ad-hoc codesign macOS binaries
        if: matrix.target.os == 'macos'
        run: |
          # Ad-hoc signing satisfies macOS's CS_EXEC_SET_KILL requirement:
          # apps built with that flag (including WaveCrux dev builds) can only
          # spawn child processes that have a valid code signature. An ad-hoc
          # signature has no Apple-registered identity but is cryptographically
          # valid and passes the kernel's CS_KILL check.
          #
          # For full notarized distribution a Developer ID certificate and
          # Apple notarization service submission are needed (post-beta).
          codesign --sign - --force \
            target/${{ matrix.target.triple }}/release/libwavecrux_sigrok_bridge.dylib
          codesign --sign - --force \
            target/${{ matrix.target.triple }}/release/wavecrux-sigrok-bridge
          codesign --verify \
            target/${{ matrix.target.triple }}/release/libwavecrux_sigrok_bridge.dylib
          codesign --verify \
            target/${{ matrix.target.triple }}/release/wavecrux-sigrok-bridge

      - name: Stage release artifacts
        shell: bash
        run: |
          set -euxo pipefail
          version="${GITHUB_REF_NAME#v}"
          tag="wavecrux-sigrok-bridge-${version}-${{ matrix.target.os }}-${{ matrix.target.arch }}"
          stage="$(mktemp -d)/${tag}"
          mkdir -p "$stage"
          cp README.md LICENSE NOTICES CONTRIBUTING.md "$stage/"
          cp -r docs "$stage/docs"
          if [[ "${{ matrix.target.os }}" == "windows" ]]; then
            cp target/${{ matrix.target.triple }}/release/wavecrux_sigrok_bridge.dll "$stage/"
            cp target/${{ matrix.target.triple }}/release/wavecrux-sigrok-bridge.exe "$stage/"
            (cd "$(dirname "$stage")" && 7z a -tzip "${tag}.zip" "${tag}")
            mv "$(dirname "$stage")/${tag}.zip" .
            sha256sum "${tag}.zip" > "${tag}.zip.sha256"
          else
            ext="so"
            [[ "${{ matrix.target.os }}" == "macos" ]] && ext="dylib"
            cp target/${{ matrix.target.triple }}/release/libwavecrux_sigrok_bridge.${ext} "$stage/"
            cp target/${{ matrix.target.triple }}/release/wavecrux-sigrok-bridge "$stage/"
            tar -czf "${tag}.tar.gz" -C "$(dirname "$stage")" "${tag}"
            shasum -a 256 "${tag}.tar.gz" > "${tag}.tar.gz.sha256"
          fi

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            wavecrux-sigrok-bridge-*.tar.gz
            wavecrux-sigrok-bridge-*.tar.gz.sha256
            wavecrux-sigrok-bridge-*.zip
            wavecrux-sigrok-bridge-*.zip.sha256
          generate_release_notes: true
